services:
  - type: web
    name: movie-tv-recommender
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "streamlit run main.py --server.port $PORT --server.address 0.0.0.0"
    autoDeploy: true
    envVars:
      - key: TMDB_API_KEY
        sync: false   # set this key securely in the Render dashboard

